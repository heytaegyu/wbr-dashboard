<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Version Placeholder</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f7f3eb;
      color: #1f2937;
      font-family: "Avenir Next", "Pretendard", "Apple SD Gothic Neo", sans-serif;
    }
    .card {
      width: min(720px, 100%);
      padding: 32px;
      border-radius: 24px;
      background: rgba(255, 252, 246, 0.94);
      border: 1px solid rgba(31, 41, 55, 0.08);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }
    p {
      margin: 0;
      color: #6b7280;
      font-size: 16px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      color: #14532d;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Claude 버전은<br />아직 이 저장소에 연결되지 않았습니다.</h1>
    <p>Claude로 만든 결과물 파일을 이 페이지로 교체하면, 선택 화면에서 바로 분리해서 비교할 수 있습니다.</p>
    <a href="./index.html">선택 화면으로 돌아가기</a>
  </main>
</body>
</html>
