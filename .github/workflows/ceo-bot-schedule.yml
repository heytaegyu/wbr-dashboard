name: CEO Bot Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1-5"
    - cron: "0 6 * * 1-5"
    - cron: "0 12 * * 1-5"

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate required secrets
        env:
          SLACK_BOT_TOKEN: ${{ secrets.CEO_SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.CEO_SLACK_CHANNEL_ID }}
        run: |
          missing=0
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret: CEO_SLACK_BOT_TOKEN"
            missing=1
          fi
          if [ -z "$SLACK_CHANNEL_ID" ]; then
            echo "::error::Missing GitHub Actions secret: CEO_SLACK_CHANNEL_ID"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve slot
        id: slot
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "slot=evening" >> "$GITHUB_OUTPUT"
          else
            hour=$(date -u +%H)
            if [ "$hour" = "00" ]; then
              echo "slot=morning" >> "$GITHUB_OUTPUT"
            elif [ "$hour" = "06" ]; then
              echo "slot=afternoon" >> "$GITHUB_OUTPUT"
            else
              echo "slot=evening" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Send CEO prompt
        env:
          SLACK_BOT_TOKEN: ${{ secrets.CEO_SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.CEO_SLACK_CHANNEL_ID }}
        run: |
          python3 scripts/send_ceo_prompt.py "${{ steps.slot.outputs.slot }}"
